#========= 规则集 ========#
rule-providers:
  # 广告拦截
  AntiAD:
    <<: *domain
    url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml"
    path: ./ruleset/anti-ad.yaml
    
  AdRules:
    <<: *domain
    url: "https://raw.githubusercontent.com/Cats-Team/AdRules/main/adrules_domainset.txt"
    path: ./ruleset/AdRules.yaml

  AD217:
    <<: *domain
    url: "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomo.yaml"
    path: ./ruleset/AD217.yaml

  Loyalsoldier:
