#========= 基础设置 ========#
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
secret: "you_password"   # API密码，请修改为你的自定义密码
unified-delay: true
tcp-concurrent: true
disable-icmp-forwarding: true
udp: true
global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true
  tracing: false
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - Mijia Cloud
    

#========= DNS ========#
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "msftconnecttest.com"
    - "xbox.*.microsoft.com"
    - "*.xboxlive.com"
    - "+.market.xiaomi.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    - "time.*.com"
    - "ntp.*.com"
    - "localhost.ptlogin2.qq.com"
    
  default-nameserver:
    - 180.184.1.1
    - 119.29.29.29
    - 223.5.5.5
    
  nameserver-policy:
    "geosite:cn": [119.29.29.29, 223.5.5.5, system]
    "geosite:apple": [119.29.29.29, 223.5.5.5, system]
    "geosite:private": [119.29.29.29, 223.5.5.5, system]
    "geosite:category-games@cn": [119.29.29.29, 223.5.5.5, system]
    
  nameserver:
    - https://223.6.6.6/dns-query
    - https://doh.pub/dns-query
    
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
    
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4


#========= 锚点定义 ========#
# 节点提供者
provider: &provider
  type: http
  interval: 86400
  proxy: DIRECT
  health-check:
    enable: true
    url: http://www.gstatic.com/generate_204
    interval: 1800

# 规则集类型
domain: &domain
  type: http
  behavior: domain
  interval: 86400

classical: &classical
  type: http
  behavior: classical
  interval: 86400

ipcidr: &ipcidr
  type: http
  behavior: ipcidr
  interval: 86400

# 订阅链接引用锚点
use: &use [Sub]

# 节点地区分组状态（true=隐藏，false=显示）
hide: &hide true


#========= 订阅链接 ========#
proxy-providers:
  Sub:
    <<: *provider
    url: "https://google.com"
    # 此处填入你的订阅链接
    path: ./proxy_providers/Sub.yaml
    override:
      additional-prefix: "[Sub] "

    
#========= 策略组 ========#
proxy-groups:
  # 代理分组
  - name: 全球畅连
    type: select
    proxies: [♻️自动选择, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
  
  - name: 国际社交
    type: select
    proxies: [♻️自动选择, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    
  - name: 国际媒体
    type: select
    proxies: [♻️自动选择, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
  
  - name: 游戏平台
    type: select
    proxies: [DIRECT, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
  
  - name: Apple
    type: select
    proxies: [DIRECT, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    
  - name: Microsoft
    type: select
    proxies: [DIRECT, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    
  - name: PayPal
    type: select
    proxies: [DIRECT, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    
  - name: 哔哩哔哩
    type: select
    proxies: [DIRECT, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    

